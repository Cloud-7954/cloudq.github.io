<!DOCTYPE html>
<html lang="en">

	<meta charset="utf-8" />

<body>
<h1>My Favorites</h1>
<h2>My Favorite Colors</h2>

<ol id="colorsList">
	
</ol>

<h2>My Favorite Foods</h2>

<ol id="foodsList">
	
</ol>

<h2>My Favorite Links</h2>

<ol id="linksList">
	
</ol>

<script>
"use strict";
let colors = ["red","green","blue","purple","pink"];
let foods = ["pizza", "sushi", "chicken", "carbonara"]; // add some foods
// let colorsList = document.querySelector("#colorsList");

// for (let i = 0; i < colors.length; i++) {
//     let list = document.createElement("li"); 
//     list.textContent = colors[i];            
//     colorsList.appendChild(list);     
// }       
// Optional - can you figure out how to pull both the key AND the value
// from the `links` object literal?
let links = {
		"RIT": "http://www.rit.edu",
		"RWAG" : "https://www.facebook.com/RWAGclub",
		"New Media Club" : "http://newmediaclub.cias.rit.edu"
	}

const createList = (listElement, array = ["puppydogs", "butterflies", "lollipops"]) => {
for (let item of array) {
        let li = document.createElement("li");
        li.textContent = item;
        listElement.appendChild(li);
    }
};

let colorsList = document.querySelector("#colorsList");
let foodsList = document.querySelector("#foodsList");
createList(colorsList, colors);
createList(foodsList, foods);

// let foodsList = document.querySelector("#foodsList");
// for (let food of foods) {
//     let li = document.createElement("li");
//     li.textContent = food;
//     foodsList.appendChild(li);
// }


let linksList = document.querySelector("#linksList");

for (let key in links) {
    
	let li = document.createElement("li");

    let a = document.createElement("a");  
    a.href = links[key];              
    a.textContent = key;                  
    li.appendChild(a);                    
    linksList.appendChild(li);             
}

</script>
</body>
