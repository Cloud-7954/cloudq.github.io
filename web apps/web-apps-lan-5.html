<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>Web Apps-5</title>
	<style>
		body{
			font-family:sans-serif;
		}
		#colorform{
			background-color:#dfecdf;
			color: #111;
			padding:1em;width:400px;
		}
		#colorform p#info{
			background-color:white;
			color: black;
			width:300px;
			height:100px;
			padding:.5em;
		}
		
		#colorform legend{ 
			font-weight:bold;
			font-size:1.2em;
		}
	</style>
</head>
<body>

<div id="colorform">
	<legend>Choose your favorite color!</legend>
	<p><input type="radio" name="colorGroup" id="colorGroupRed" value="red" /> Red</p>
	<p><input type="radio" name="colorGroup" id="colorGroupGreen" value="green" /> Green</p>
	<p><input type="radio" name="colorGroup" id="colorGroupBlue" value="blue" /> Blue</p>
	<p><button id="colorButton" type="button">Submit</button></p>
	<p id="info"></p>
</div>

<script>
/* Write your code here! */
const radios = document.querySelectorAll('input[name="colorGroup"]'); 
const submitButton = document.querySelector('#colorButton');
const infoDisplay = document.querySelector('#info');
const legendText = document.querySelector('legend');


for (let radio of radios) {
    radio.addEventListener('change', (e) => {
        infoDisplay.textContent = `You have selected "${e.target.value}"!`;
    });
}


submitButton.addEventListener('click', () => {
    let selectedColor = "";
    

    for (let radio of radios) {
        if (radio.checked) {
            selectedColor = radio.value;
            break; 
        }
    }
    

    if (selectedColor) {
        infoDisplay.textContent = `Your FINAL CHOICE is "${selectedColor}"!`;
        legendText.style.color = selectedColor;
    } else {
        infoDisplay.textContent = "Please select a color first.";
    }
});

</script>
</body>
</html>
