function getSelectedColors() {
    let selected = [];
    for (let box of checkboxes) {
        if (box.checked) {
            selected.push(box.value); 
        }
    }
    return selected; 
}

for (let box of checkboxes) {
    box.addEventListener('change', () => {
		
        let colors = getSelectedColors();
        infoDisplay.textContent = `You have selected: ${colors.join(", ")}`;
    });
}

submitButton.addEventListener('click', () => {
    let colors = getSelectedColors(); 
    
    if (colors.length > 0) {
        infoDisplay.textContent = `Your FINAL CHOICES are: ${colors.join(", ")}`;
    } else {
        infoDisplay.textContent = "Please select at least one color.";
    }
});
